name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tauri-build:
    name: Tauri Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install command tools
        shell: powershell
        run: |
          choco install make --no-progress -y
          $gitBash = 'C:\Program Files\Git\bin\bash.exe'
          if (-not (Test-Path $gitBash)) {
            throw "Git Bash not found at $gitBash"
          }
          Add-Content $env:GITHUB_PATH 'C:\Program Files\Git\bin'

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check command tools
        run: |
          make --version
          bash --version

      - name: Run quality gate
        run: make check-lint

      - name: Install frontend dependencies
        run: make install-frozen

      - name: Build Tauri bundles
        run: make tauri-build

      - name: Upload release bundles
        uses: actions/upload-artifact@v4
        with:
          name: ddnet-manager-windows-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/**
          fail_on_unmatched_files: true
